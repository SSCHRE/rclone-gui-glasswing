name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          node --check electron/main.js
          node --check electron/preload.js
          node --check src/renderer.js
          node --check src/job-output.js
          node --check scripts/generate-icons.js

      - name: Generate icons
        run: npm run icons

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build Windows app
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR build: packaging unpacked app only (no publish/signing)"
            npx electron-builder --win dir --publish never
          else
            echo "Main build: portable + NSIS installers (no publish/signing)"
            npx electron-builder --win --publish never
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glasswing-windows-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
